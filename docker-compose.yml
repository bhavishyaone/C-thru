services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cthru
      POSTGRES_PASSWORD: cthru
      POSTGRES_DB: cthru
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cthru"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://cthru:cthru@db:5432/cthru
      NODE_ENV: production
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
